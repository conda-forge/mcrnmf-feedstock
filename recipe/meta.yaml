{% set name = "mcrnmf" %}
{% set version = "0.1.2" %}
{% set python_min = "3.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/m/mcrnmf/mcrnmf-{{ version }}.tar.gz
  sha256: 33dc5bef65d6b400c67547a7e5565088313edcb5c87d039f43619da896408766

build:
  noarch: python
  script: "{{ PYTHON }} -m pip install . -vv"
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools >=61.0
  run:
    - python >={{ python_min }},<3.14
    - numba >=0.61.2
    - numpy >=1.24,<2.3

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - mcrnmf
  commands:
    - pip check

about:
  home: https://github.com/siddarthVasudevan/mcrnmf
  doc_url: https://siddarthvasudevan.github.io/mcrnmf/
  license: MIT
  license_file: LICENSE
  summary: "Multivariate Curve Resolution using Nonnegative Matrix Factorization"

extra:
  recipe-maintainers:
    - siddarthVasudevan
